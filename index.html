<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoRoot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:#111827;
    background:#000;
    line-height:1.6;
}

/* HERO */
.hero{
    background:linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
    url('Fundo-desktop.jpg');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    padding:20px;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.85);

    padding:16px 20px;
    padding-bottom:22px;

    z-index:1000;
    backdrop-filter: blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;
}

.nav-left{
    position:absolute;
    left:20px;
}

.nav-left img{
    width:105px;
    background:white;
    padding:5px;
    border-radius:6px;
}

.nav-center{
    display:flex;
    gap:22px;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
}

/* BOTÃO MENU */
.menu-btn{
    display:none;
    position:absolute;
    right:20px;
    font-size:30px;
    color:white;
    cursor:pointer;
}

/* MENU MOBILE */
.mobile-menu{
    position:fixed;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.95);
    z-index:999;

    display:none;
    flex-direction:column;
    text-align:center;

    overflow:hidden;
    max-height:0;
    opacity:0;
    transition:all 0.35s ease;
}

/* 🔥 MENU VERTICAL */
.mobile-menu a{
    color:white;
    padding:16px;
    text-decoration:none;
    font-size:15px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* CONTENT */
.container{
    background:#f9fafb;
    padding:60px 20px;
}

.card{
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    color:#166534;
    font-size:24px;
    margin-bottom:12px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.feature{
    background:#f3f4f6;
    padding:18px;
    border-radius:12px;
}

img{
    width:100%;
    border-radius:14px;
    margin-top:15px;
}

footer{
    text-align:center;
    padding:25px;
    background:#111827;
    color:white;
}

.hero h1{
    font-size:72px;
    margin:0;
    font-weight:700;
}

.hero p{
    font-size:22px;
    margin-top:10px;
    font-weight:300;
    opacity:0.95;
}

/* MOBILE */
@media(max-width:768px){

    nav{
        padding:34px 10px;
        justify-content:flex-end;
    }

    .nav-left img{
        width:95px;
    }

    .nav-center{
        display:none;
    }

    .menu-btn{
        display:block;
    }

    .mobile-menu.active{
        display:flex;
        max-height:500px;
        opacity:1;
    }
}

</style>
</head>

<body>

<nav>

    <div class="nav-left">
        <img src="logo.png">
    </div>

    <div class="nav-center">
        <a href="#produto">Produto</a>
        <a href="#vantagens">Vantagens</a>
        <a href="#funcionamento">Funcionamento</a>
        <a href="#composicao">Composição</a>
        <a href="#rotulo">Rótulo</a>
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="#produto" onclick="toggleMenu()">Produto</a>
    <a href="#vantagens" onclick="toggleMenu()">Vantagens</a>
    <a href="#funcionamento" onclick="toggleMenu()">Funcionamento</a>
    <a href="#composicao" onclick="toggleMenu()">Composição</a>
    <a href="#rotulo" onclick="toggleMenu()">Rótulo</a>
</div>

<section class="hero">
    <div>
        <h1>EcoRoot</h1>
        <p>Cuvetes biodegradáveis com libertação controlada de nutrientes</p>
    </div>
</section>

<section class="container">
<!-- teu conteúdo 그대로 -->
</section>

<footer>
EcoRoot™ | Projeto académico – Solução sustentável para viveiros florestais
</footer>

<script>
function toggleMenu(){

    const menu = document.getElementById("mobileMenu");
    const nav = document.querySelector("nav");

    const isOpen = menu.classList.contains("active");

    if(isOpen){
        menu.classList.remove("active");
        menu.style.top = "0px";
    }else{
        const height = nav.offsetHeight;
        menu.style.top = height + "px";
        menu.classList.add("active");
    }
}
</script>

</body>
</html>
