<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoRoot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:#111827;
    background:#000;
    line-height:1.6;
}

/* HERO */
.hero{
    background:linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
    url('Fundo-desktop.jpg');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    padding:20px;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.85);
    padding:26px 20px;
    z-index:1000;
    backdrop-filter: blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.nav-left{
    position:absolute;
    left:20px;
}

.nav-left img{
    width:115px;
    height:auto;
    object-fit:contain;
    background:white;
    padding:6px;
    border-radius:6px;
}

/* LINKS DESKTOP */
.nav-center{
    display:flex;
    gap:22px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
}

/* BOTÃO MENU */
.menu-toggle{
    display:none;

    position:absolute;
    right:18px;   /* 👈 FIXO À DIREITA */
    top:50%;
    transform:translateY(-50%);

    font-size:30px;
    color:white;
    cursor:pointer;
    user-select:none;

    padding:8px;
    border-radius:6px;
}

/* CONTAINER */
.container{
    background:#f9fafb;
    padding:60px 20px;
}

.card{
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HERO TEXT */
.hero h1{
    font-size:72px;
    margin:0;
}

.hero p{
    font-size:22px;
    opacity:0.95;
}

/* FOOTER */
footer{
    text-align:center;
    padding:25px;
    background:#111827;
    color:white;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

    nav{
        padding:14px 14px;
        justify-content:flex-start;
    }

    .nav-left{
        left:10px;
    }

    .nav-left img{
        width:75px;
        padding:4px;
    }

    /* BOTÃO VISÍVEL À DIREITA SEM SAIR */
    .menu-toggle{
        display:block;
        right:14px;   /* 👈 garante margem dentro do ecrã */
    }

    /* MENU */
    .nav-center{
        display:none;
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        background:rgba(0,0,0,0.95);

        flex-direction:column;
        align-items:center;
        gap:10px;
        padding:15px 0;
    }

    .nav-center.active{
        display:flex;
    }

    nav a{
        font-size:14px;
    }

    .hero h1{
        font-size:42px;
    }

    .hero p{
        font-size:16px;
    }
}

</style>
</head>

<body>

<nav>

    <div class="nav-left">
        <img src="logo.png">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-center" id="menu">
        <a href="#produto" onclick="closeMenu()">Produto</a>
        <a href="#vantagens" onclick="closeMenu()">Vantagens</a>
        <a href="#funcionamento" onclick="closeMenu()">Funcionamento</a>
        <a href="#composicao" onclick="closeMenu()">Composição</a>
        <a href="#rotulo" onclick="closeMenu()">Rótulo</a>
    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>EcoRoot</h1>
        <p>Cuvetes biodegradáveis com libertação controlada de nutrientes</p>
    </div>
</section>

<footer>
EcoRoot™ | Projeto académico – Solução sustentável para viveiros florestais
</footer>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
}
</script>

</body>
</html>
